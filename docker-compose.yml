version: '3.8'

services:
  backend:
    build: ./backend
    container_name: smpp-backend
    ports:
      - "2775:2775"  # SMPP port
      - "8080:8080"  # HTTP API port
    volumes:
      - smpp-data:/app/data
    environment:
      - SMPP_HOST=0.0.0.0
      - SMPP_PORT=2775
      - HTTP_HOST=0.0.0.0
      - HTTP_PORT=8080
      - DB_PATH=/app/data/smpp.db
      # Security: Change these in production
      # - ADMIN_PASSWORD=your-secure-password
      # - JWT_SECRET=your-secure-jwt-secret
      # - CORS_ORIGINS=https://your-domain.com
    restart: unless-stopped
    # Security: Run with limited privileges
    security_opt:
      - no-new-privileges:true
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: smpp-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    # Security: Run with limited privileges
    security_opt:
      - no-new-privileges:true
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  smpp-data:
